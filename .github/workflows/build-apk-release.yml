name: Build APK & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: ''
        type: string

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: budget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            budget/.dart_tool
            budget/.packages
            budget/.flutter-plugins
            budget/.flutter-plugins-dependencies
            budget/build
          key: ${{ runner.os }}-pub-${{ hashFiles('budget/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Check keystore secret
        id: check_keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore (if available)
        if: steps.check_keystore.outputs.available == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
        working-directory: budget

      - name: Generate key.properties (if keystore available)
        if: steps.check_keystore.outputs.available == 'true'
        run: |
          echo "storeFile=keystore.jks" > android/key.properties
          echo "keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> android/key.properties
        working-directory: budget

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version_name }}" ]]; then
            echo "VERSION=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT
          fi
        working-directory: budget

      - name: Build debug APK
        if: ${{ github.event.inputs.build_mode == 'debug' || github.event.inputs.build_mode == '' }}
        run: flutter build apk --debug

      - name: Build release APK
        if: ${{ github.event.inputs.build_mode == 'release' || startsWith(github.ref, 'refs/tags/') }}
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MODE="debug"
          if [[ -f build/app/outputs/flutter-apk/app-release.apk ]]; then
            MODE="release"
            cp build/app/outputs/flutter-apk/app-release.apk "CashewVN-${VERSION}-${MODE}.apk"
          else
            cp build/app/outputs/flutter-apk/app-debug.apk "CashewVN-${VERSION}-${MODE}.apk"
          fi
        working-directory: budget

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CashewVN-APK
          path: budget/CashewVN-*.apk
          retention-days: 30

      - name: Create Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          name: Cashew VN ${{ steps.version.outputs.VERSION }}
          body: |
            Cashew VN - Build ${{ steps.version.outputs.VERSION }}

            - Package: tungcv.cashew
            - App name: Cashew VN
            - This build can be installed alongside the official Cashew app.

            ## APK Downloads
            - CashewVN-${{ steps.version.outputs.VERSION }}.apk
          files: |
            budget/CashewVN-*.apk
          generate_release_notes: false
