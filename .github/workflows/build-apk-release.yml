name: Build APK & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: ''
        type: string

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: budget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            budget/.dart_tool
            budget/.packages
            budget/.flutter-plugins
            budget/.flutter-plugins-dependencies
            budget/build
          key: ${{ runner.os }}-pub-${{ hashFiles('budget/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Check keystore secret
        id: check_keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore (if available)
        if: steps.check_keystore.outputs.available == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
        working-directory: budget

      - name: Generate key.properties (if keystore available)
        if: steps.check_keystore.outputs.available == 'true'
        run: |
          echo "storeFile=keystore.jks" > android/key.properties
          echo "keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> android/key.properties
        working-directory: budget

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version_name }}" ]]; then
            echo "VERSION=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT
          fi
        working-directory: budget

      - name: Build debug APK
        if: ${{ github.event.inputs.build_mode == 'debug' || github.event.inputs.build_mode == '' }}
        run: flutter build apk --debug --split-per-abi

      - name: Build release APK
        if: ${{ github.event.inputs.build_mode == 'release' || startsWith(github.ref, 'refs/tags/') }}
        run: |
          if [ "${{ steps.check_keystore.outputs.available }}" != "true" ]; then
            echo "::error::Release build requires a keystore. Add these repository secrets before retrying:"
            echo "::error::  - KEYSTORE_BASE64 (base64-encoded .jks file)"
            echo "::error::  - KEYSTORE_KEY_ALIAS"
            echo "::error::  - KEYSTORE_STORE_PASSWORD"
            echo "::error::  - KEYSTORE_KEY_PASSWORD"
            echo "::error::To generate a keystore locally: keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias cashew"
            exit 1
          fi
          flutter build apk --release --split-per-abi

      - name: Rename and collect APKs
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          
          # Determine build mode from what's available
          MODE="debug"
          PATTERN="*-debug"
          if ls build/app/outputs/flutter-apk/app-*-release.apk 2>/dev/null | head -1 | grep -q release; then
            MODE="release"
            PATTERN="*-release"
          fi
          
          find build/app/outputs/flutter-apk/ -name "app-${PATTERN}.apk" | while read -r apk; do
            arch=$(echo "$apk" | sed -E "s/.*app-(.*)-${MODE}\.apk/\1/")
            if [ "$arch" = "${MODE}" ]; then
              # single APK fallback (no split)
              cp "$apk" "CashewVN-${VERSION}-${MODE}.apk"
            else
              cp "$apk" "CashewVN-${VERSION}-${MODE}-${arch}.apk"
            fi
          done
        working-directory: budget

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CashewVN-APK
          path: budget/CashewVN-*.apk
          retention-days: 30

      - name: Generate release tag
        id: release_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ steps.version.outputs.VERSION }}-build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag (workflow_dispatch release only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_mode == 'release' }}
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.build_mode == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Cashew VN ${{ steps.version.outputs.VERSION }}
          body: |
            Cashew VN - Build ${{ steps.version.outputs.VERSION }}

            - Package: tungcv.cashew
            - App name: Cashew VN
            - This build can be installed alongside the official Cashew app.

            ## APK Downloads (attached below)
          files: |
            budget/CashewVN-*.apk
          generate_release_notes: false
